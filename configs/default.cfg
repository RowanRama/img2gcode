# img2gcode configuration file
# Format mirrors PrusaSlicer conventions where applicable

[mode]
# Generation strategy:
#   fill — segment image into N tools, draw perimeter loops + zigzag infill
#   edge — Canny edge detection, collapse parallel edges, trace into polylines
type = fill

[machine]
# Print bed dimensions (mm)
bed_size_x = 1200
bed_size_y = 1200

# Starting corner offset (mm) — image is placed starting here
origin_x = 10
origin_y = 10

# Maximum print dimension (the image will be scaled to fit within this square, mm)
print_width = 1000
print_height = 700

# Travel speed (mm/min)
travel_speed = 7800

# Print speed (mm/min)
print_speed = 1800

# Z lift on travel moves (mm)
z_lift = 1.0

[tools]
# Number of colour clusters (tools). Currently up to 2 are supported for
# dual-extrusion machines, but the pipeline supports arbitrary n.
num_tools = 2

# Tool change GCode snippets (one per tool, 0-indexed).
# Use {tool} as placeholder for the tool index.
tool_change_gcode =
    T{tool}
    G92 E0

[image]
# Whiteness threshold: pixels with R, G, B all above this value are treated
# as background and discarded (0-255).
white_threshold = 220

# Minimum cluster area in pixels before it is kept (removes tiny speckles)
min_cluster_area = 10

[layers]
# Total number of layers to generate
num_layers = 1

# Height of each layer (mm)
layer_height = 3

# Number of solid perimeter loops drawn before infill
perimeter_loops = 1

# Number of horizontal solid shell layers (top/bottom solid fill layers)
horizontal_shell_layers = 3

[infill]
# Infill pattern: zigzag (only pattern currently implemented)
pattern = zigzag

# Infill density as a percentage (0-100).
# This is the primary density control, matching PrusaSlicer convention.
# line spacing is derived as: nozzle_diameter / (density / 100)
# e.g. 0.4mm nozzle at 40% density → spacing = 1.0mm
density = 100

# Explicit line spacing override (mm). Set to 0 to use density instead.
# If non-zero this takes precedence over density.
line_spacing = 0

# Infill angle (degrees). Alternates angle/(angle+90) per layer for rectilinear.
angle = -45

# Connect adjacent infill lines into a continuous serpentine (PrusaSlicer-style).
# true  → lines joined by short perpendicular connectors at the mask boundary.
#         The connectors alternate edges and can make the edge look "paired".
# false → each scan line is emitted as its own polyline with a travel between
#         lines.  Gives a visually-even parallel-hatch look.
connect_lines = true

[extrusion]
# Filament diameter (mm)
filament_diameter = 1.75

# Nozzle diameter (mm)
nozzle_diameter = 4

# Physical width of a printed line (mm).
# 0 = use nozzle_diameter (typical default). Values 100-150% of nozzle are common.
# This controls both extrusion and the rendered line width in the visualiser.
line_width_mm = 0

# Extrusion multiplier
extrusion_multiplier = 1.0

# Layer height used in extrusion calculations (should match layers.layer_height)
layer_height = 3

[edge]
# CLAHE (Contrast Limited Adaptive Histogram Equalisation) preprocessing.
# Boosts local contrast so faint features (hair strands, light eyebrows)
# become detectable. clahe_clip = 0 disables. 1.5 keeps hair detail while
# avoiding over-driven skin texture; raise to 3-4 for flat / low-contrast
# images, lower toward 0.5-1.0 if skin pores start showing up.
clahe_clip = 1.5
clahe_grid = 8

# Bilateral pre-filter (after CLAHE). Set bilateral_d = 0 to disable.
# A small amount of smoothing helps short adjacent edges merge into a
# single longer one rather than fragmenting the trace.
bilateral_d = 5
bilateral_sigma_color = 35
bilateral_sigma_space = 35

# Canny thresholds. Set both to 0 for auto thresholds via Otsu (recommended;
# the median heuristic breaks on white-background portraits).
canny_low = 0
canny_high = 0
canny_sigma = 0.33

# Multi-scale Canny: comma-separated Gaussian blur sigmas. Each scale
# contributes its edges to the final OR'd map.
#   0       → no blur (catches finest texture: hair, beard, skin pores)
#   1.0     → small features (eyelashes, eyebrows, mouth detail)
#   2.0     → structural edges (jawline, hairline, suit folds)
# Skipping 0 yields cleaner, less fragmented strokes; add it back if you
# want maximum hair / texture detail at the cost of more dashes.
detection_scales = 0.2,1.0,2.0

# Foreground masking. When true, edges are AND-ed with the segmenter's
# foreground mask dilated by foreground_dilate_px so silhouette edges
# survive. Disable for full-frame photos with no clean background.
restrict_to_foreground = false
foreground_dilate_px = 3

# Parallel-edge collapse: edges within (line_width * collapse_factor) of
# each other merge into one centerline. 1.0 ≈ collapse anything closer
# than line width; raise toward 1.5 for chunkier strokes, lower for more
# detail. Below ~0.5 the guard ends up rejecting many edges instead of
# merging them, which fragments the trace — keep ≥ 0.7 unless you really
# want every Canny stroke preserved.
collapse_factor = 0.0

# Drawn-mask guard: candidate strokes that would print within
# (line_width * min_separation_factor) of an already-emitted stroke are
# split or dropped. Prevents the nozzle from re-tracing existing lines.
# Lower values let nearby parallel strokes coexist (less splitting),
# higher values enforce stricter separation.
min_separation_factor = 0.8

# Polyline chaining: after the guard splits polylines, any two whose
# endpoints sit within (line_width * chain_gap_factor) get concatenated
# into a single continuous polyline. The trace removes junction pixels
# which fragments the skeleton at every meeting of 3+ edges; chaining
# stitches them back together so the printed output looks like the Canny
# edges, not a field of dashes. 0 disables chaining.
chain_gap_factor = 1.5

# Drop polylines whose total geometric length (in pixels) is below this
# threshold. Filters short noise without dropping long straight edges
# that Douglas-Peucker collapses to 2 vertices.
min_polyline_length = 4

# Douglas-Peucker simplification tolerance (px). 0 disables simplification.
simplify_epsilon = 0.8

# Which tool index carries the edge strokes (multi-tool inputs only).
tool_idx = 0

# If non-empty, save the intermediate edge map to this path as PNG.
# Lets you tune CLAHE / scales / Canny without running the full trace.
# Same effect as the --debug-edges CLI flag.
debug_edges_path =
